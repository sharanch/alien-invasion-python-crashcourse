name: Build Linux Packages

on:
  push:
    tags:
      - 'v*'          # triggers on tags like v1.0.0, v2.1.3
  workflow_dispatch:  # allows manual trigger from GitHub UI
    inputs:
      version:
        description: 'Version to build (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-deb:
    name: Build .deb package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Strip the leading 'v' from the tag (v1.0.0 → 1.0.0)
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Inject version into control file
        run: |
          sed -i "s/VERSION_PLACEHOLDER/${{ steps.version.outputs.VERSION }}/" \
            packaging/deb/DEBIAN/control

      - name: Copy game file into deb tree
        run: |
          cp alien_invasion.py \
            packaging/deb/usr/share/games/alien-invasion/alien_invasion.py

      - name: Fix permissions
        run: |
          find packaging/deb -type d -exec chmod 755 {} \;
          find packaging/deb -type f -exec chmod 644 {} \;
          chmod 755 packaging/deb/usr/games/alien-invasion
          chmod 755 packaging/deb/DEBIAN/postinst

      - name: Build .deb
        run: |
          fakeroot dpkg-deb --build packaging/deb \
            alien-invasion_${{ steps.version.outputs.VERSION }}_all.deb

      - name: Verify .deb
        run: dpkg-deb --info alien-invasion_${{ steps.version.outputs.VERSION }}_all.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: alien-invasion_${{ steps.version.outputs.VERSION }}_all.deb

  build-rpm:
    name: Build .rpm package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rpmbuild
        run: sudo apt-get install -y rpm

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Set up rpmbuild tree
        run: |
          mkdir -p ~/rpmbuild/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}

      - name: Copy sources into rpmbuild/SOURCES
        run: |
          cp alien_invasion.py                              ~/rpmbuild/SOURCES/
          cp packaging/deb/usr/games/alien-invasion         ~/rpmbuild/SOURCES/alien-invasion.sh
          cp packaging/deb/usr/share/applications/*.desktop ~/rpmbuild/SOURCES/
          cp packaging/deb/usr/share/pixmaps/*.svg          ~/rpmbuild/SOURCES/
          cp packaging/rpm/alien-invasion.spec               ~/rpmbuild/SPECS/

      - name: Build .rpm
        run: |
          rpmbuild \
            --define "_topdir $HOME/rpmbuild" \
            --define "version_tag ${{ steps.version.outputs.VERSION }}" \
            -bb ~/rpmbuild/SPECS/alien-invasion.spec

      - name: Locate and copy .rpm to workspace
        run: |
          RPM=$(find ~/rpmbuild/RPMS -name "*.rpm")
          cp "$RPM" .
          echo "RPM_FILE=$(basename $RPM)" >> $GITHUB_ENV

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: ${{ env.RPM_FILE }}

  release:
    name: Attach packages to GitHub Release
    runs-on: ubuntu-latest
    needs: [build-deb, build-rpm]
    # Only run this job when triggered by a tag push, not manual dispatch
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-package

      - name: Download .rpm artifact
        uses: actions/download-artifact@v4
        with:
          name: rpm-package

      - name: Create GitHub Release and upload packages
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.deb
            *.rpm
          generate_release_notes: true
